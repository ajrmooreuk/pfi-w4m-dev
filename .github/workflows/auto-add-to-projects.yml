name: Auto-Add Issues to Project Boards

# Routes new issues to Engineering or Product project based on type: labels.
# Product types (epic, feature, story, wbs, pbs) -> Product project
# All other issues -> Engineering project
# Requires PROJECT_PAT secret with `project` scope.
# Generated by S61.29.2 — do not edit manually; update hub template and redistribute.

on:
  issues:
    types: [opened]

permissions:
  issues: read

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - name: Route issue to Engineering or Product project
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_PAT }}
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name);

            const PRODUCT_TYPES = ['type:epic','type:feature','type:story','type:wbs','type:pbs'];
            const isProductWork = labels.some(l => PRODUCT_TYPES.includes(l));

            const ENGINEERING_PROJECT = 'PVT_kwHODCCs_c4BSCdM';
            const PRODUCT_PROJECT = 'PVT_kwHODCCs_c4BSCdO';

            const targetId = isProductWork ? PRODUCT_PROJECT : ENGINEERING_PROJECT;
            const targetName = isProductWork ? 'Product' : 'Engineering';

            try {
              await github.graphql(`
                mutation($projectId: ID!, $contentId: ID!) {
                  addProjectV2ItemById(input: {
                    projectId: $projectId
                    contentId: $contentId
                  }) { item { id } }
                }
              `, { projectId: targetId, contentId: issue.node_id });
              core.info(`Added #${issue.number} to ${targetName} project`);
            } catch (err) {
              if (err.message && err.message.includes('already')) {
                core.info(`#${issue.number} already on ${targetName} project`);
              } else {
                core.setFailed(`Failed: ${err.message}`);
              }
            }
